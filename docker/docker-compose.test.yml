## docker-compose file for running alexa-cli integration tests.
##
## Usage:
##   docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit
##
## The `wiremock` service is the mock HTTP backend.
## The `test-runner` compiles and runs all tests (including the integration tests
## that are marked #[ignore]) against WireMock.

services:
  wiremock:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8888:8080"
    environment:
      - WIREMOCK_OPTIONS=--verbose
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    depends_on:
      wiremock:
        condition: service_healthy
    environment:
      - ALEXA_BASE_URL=http://wiremock:8080
      # Disable keyring in CI; fall back to file-based cookie store
      - ALEXA_SKIP_KEYRING=1
    command: >
      cargo test -- --include-ignored 2>&1
    volumes:
      # Mount the source tree so we don't have to rebuild for every code change
      - ..:/app:ro
      # Persist the build cache across runs
      - alexa-cli-target:/app/target

volumes:
  alexa-cli-target:
