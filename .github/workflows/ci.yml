name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev
      - run: cargo clippy -- -D warnings

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev
      - name: Run unit tests
        run: cargo test

  integration-test:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    # Run integration tests on every push to main and on PRs (Docker is available on GitHub-hosted runners)
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests via Docker Compose
        run: |
          docker compose -f docker/docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test-runner
